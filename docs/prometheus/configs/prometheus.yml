# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"

    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.

    static_configs:
      - targets: ["localhost:9090"]
       # The label name is added as a label `label_name=<label_value>` to any timeseries scraped from this config.
        labels:
          app: "prometheus"

  - job_name: 'guacamole'

    static_configs:
      - targets: ['10.10.1.1:9100']

  - job_name: 'grafana'

    static_configs:
      - targets: ['10.10.1.2:9100']

  - job_name: 'node_exporter'

    static_configs:
      - targets: ['10.10.1.3:9100']

  - job_name: 'dns'

    static_configs:
      - targets: ['10.10.2.1:9100']

  - job_name: 'ntp'

    static_configs:
      - targets: ['10.10.2.2:9100']

  - job_name: 'ca'
    static_configs:
      - targets: ['10.10.2.3:9100']

  - job_name: 'wiki'

    static_configs:
      - targets: ['10.10.3.1:9100']

  - job_name: 'gitea'
    static_configs:
      - targets: ['10.10.3.2:9100']

  - job_name: '404jun'
    static_configs:
      - targets: ['10.10.3.9:9100']

  - job_name: 'wazuh'

    static_configs:
      - targets:
        - '10.10.5.1:9100'

  - job_name: 'splunk'

    static_configs:
      - targets: ['10.10.5.2:9100']

  - job_name: 'pfsense'

    metrics_path: /snmp

    params:
      module: [if_mib]
      auth: [public_v2]

    static_configs:
      - targets:
        - 10.10.1.254

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: localhost:9116
