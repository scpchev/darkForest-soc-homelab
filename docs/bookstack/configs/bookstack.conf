<VirtualHost *:80>

    ServerName wiki.darkforest.lab

    Redirect permanent / https://wiki.darkforest.lab/

</VirtualHost>

<VirtualHost *:443>

    ServerName wiki.darkforest.lab

    DocumentRoot /var/www/bookstack/public

    SSLEngine on

    SSLCertificateFile /etc/pki/tls/darkforest/wiki.crt
    SSLCertificateKeyFile /etc/pki/tls/darkforest/wiki.key

    <Directory /var/www/bookstack/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/bookstack-error.log
    CustomLog /var/log/httpd/bookstack-access.log combined

</VirtualHost>
