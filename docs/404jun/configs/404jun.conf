server {
    listen 80;
    server_name 404jun.darkforest.lab;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 404jun.darkforest.lab;

    root /var/www/404jun;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/404jun.crt;
    ssl_certificate_key /etc/nginx/ssl/404jun.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/404jun-access.log;
    error_log  /var/log/nginx/404jun-error.log;

    location / {
        try_files $uri $uri/ =404;
    }
}
