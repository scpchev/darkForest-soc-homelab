server {
    listen 80;
    server_name splunk.darkforest.lab;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name splunk.darkforest.lab;

    ssl_certificate     /etc/nginx/ssl/splunk.crt;
    ssl_certificate_key /etc/nginx/ssl/splunk.key;

location / {
    proxy_pass http://127.0.0.1:8000;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_redirect http://127.0.0.1:8000/ https://splunk.darkforest.lab/;
    proxy_redirect http://localhost/ https://splunk.darkforest.lab/;
}
}
